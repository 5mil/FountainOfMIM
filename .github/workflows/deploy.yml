name: Deploy to Wasmer

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 20
    - run: npm ci --legacy-peer-deps
    - run: npm run build
    - name: Deploy
      uses: wasmer/deploy-action@v1
      with:
        name: fountainofmim
        token: ${{ secrets.WASMER_TOKEN }}